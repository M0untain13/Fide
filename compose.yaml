services:
  postgres:
    container_name: ${POSTGRES_HOST}
    image: postgres:15-alpine
    env_file:
      - .env
    command:
      - 'postgres'
      - '-c'
      - 'port=${POSTGRES_PORT}'
    volumes:
      - db_vol:/var/lib/postgresql/data
    networks:
      - server_net

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_MAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PW}
    ports:
      - "5050:80"
    restart: always
  
  blazor:
    container_name: blazor
    build:
      context: ./Fide
    ports:
      - "5001:80"
    restart: always
  
  nginx:
    container_name: ${NGINX_HOST}
    build: ./Nginx
    restart: on-failure
    ports:
      - ${NGINX_PORT}:${NGINX_PORT}
    depends_on:
      - react_app
      - users_service
      - requests_service
      - products_service
      - database_service
    env_file:
      - .env
    networks:
      - server_net

volumes:
  db_vol: {}

networks:
  server_net:
    driver: bridge